# ==============================================================================
# SecureMail Monorepo - Orchestration Layer
# ==============================================================================
# This file uses the "include" feature (Docker Compose v2.20+) to modularize 
# service management. Each service defines its own runtime in its directory.
# ==============================================================================

include:
  - SecureMail-Ai/docker-compose.yml
  - SecureMail-Malware/docker-compose.yml
  - SecureMail-Backend/docker-compose.yaml
  - SecureMail-Frontend/docker-compose.yml

# Note: Flutter is managed via Turborepo (npm run dev:flutter) for Mobile dev.
# Core infrastructure (Postgres/Redis) is defined in Backend's compose.

networks:
  securemail_network:
    name: securemail_network
    driver: bridge

volumes:
  securemail_pg:
    external: true
    name: securemail_postgres_data
  securemail_uploads:
    external: true
    name: securemail_securemail_uploads
